<h1>Board Game Tracker</h1>
@if (games$ | async; as games) {
<div class="games-grid">
    @for (game of games; track game.id_game) {
    <div class="game-card" (click)="goToGame(game)">
        <img [src]="game.image_url"
             [alt]="game.name">
        <div class="game-info">
            <h2>{{ game.name }}</h2>
            <p><strong>📅 Ano:</strong> {{ game.year }}</p>
            <p><strong>🏆 Ranking:</strong> #{{ game.rank }}</p>
            <p><strong>⭐ Rating:</strong> {{ game.rating }}</p>
            <p><strong>⚖️ Complexidade:</strong> {{ game.weight }}</p>
        </div>
    </div>
    }
</div>

}
